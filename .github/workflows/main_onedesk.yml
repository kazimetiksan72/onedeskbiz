name: Build and deploy Node.js app to Azure Web App - onedesk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure rolldown native binding exists on Linux
        run: |
          if [ ! -d "frontend/node_modules/@rolldown/binding-linux-x64-gnu" ]; then
            npm install --no-save --workspace=frontend @rolldown/binding-linux-x64-gnu@1.0.0-rc.15
          fi

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92596BAD998E464380596B9377B68391 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A2FBE4181B8A4F12B2B8ACDDFD47BB54 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5B2A72777C8B44718806EC3A65883C3B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'onedesk'
          slot-name: 'Production'
          package: .
